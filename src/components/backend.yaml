apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-backend
  labels:
    app: trading-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trading-backend
  template:
    metadata:
      labels:
        app: trading-backend
    spec:
      containers:
      - name: backend
        # Use the full path of the image you pushed to Artifact Registry
        image:  europe-west4]-docker.pkg.dev/[PROJECT_ID]/[REPO_NAME]/mock-backend:v1
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-uri
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        # Add other environment variables your backend requires here
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: trading-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP