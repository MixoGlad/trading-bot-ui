# Azure Pipeline for building and deploying to GKE
trigger:
  branches:
    include:
    - dev
    - main

variables:
  # Google Cloud configuration
  GCP_PROJECT_ID: 'project-73bca58e-8d66-4aa9-be9'
  GKE_CLUSTER: 'vertex-capital-007'
  GKE_ZONE: 'us-central1-a'
  NAMESPACE: 'trading-bot'
  
  # Image names
  BACKEND_IMAGE: 'trading-bot-backend'
  FRONTEND_IMAGE: 'trading-bot-frontend'
  
  # Container registry
  REGISTRY: 'gcr.io'
  
  # Image tag using Build ID for uniqueness
  IMAGE_TAG: $(Build.BuildId)
  
  # Service connection names
  GCR_SERVICE_CONNECTION: 'Docker'
  GKE_SERVICE_CONNECTION: 'zero-day-brokers-dev'

stages:
- stage: Build
  displayName: 'Build and Push Images'
  jobs:
  - job: BuildAndPush
    displayName: 'Build Docker Images and Push to GCR'
    pool:
      vmImage: 'ubuntu-latest'  # Changed from 'Default' to 'ubuntu-latest'
    
    steps:
    # Checkout code
    - checkout: self
    
    # Setup Node.js for linting (optional - remove if not needed)
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'
    
    - script: |
        npm install
        npm run lint || true
      displayName: 'Install dependencies and lint'
      condition: false  # Disable if you don't have package.json
    
    # Authenticate Docker to GCR
    - task: Docker@2
      displayName: 'Login to Google Container Registry'
      inputs:
        command: login
        containerRegistry: $(GCR_SERVICE_CONNECTION)
    
    # Build and Push Backend Image (combined)
    - task: Docker@2
      displayName: 'Build and Push Backend Image'
      inputs:
        command: buildAndPush
        containerRegistry: $(GCR_SERVICE_CONNECTION)
        dockerfile: './mock-backend/Dockerfile'
        buildContext: './mock-backend'
        tags: |
          $(REGISTRY)/$(GCP_PROJECT_ID)/$(BACKEND_IMAGE):$(IMAGE_TAG)
          $(REGISTRY)/$(GCP_PROJECT_ID)/$(BACKEND_IMAGE):latest
    
    # Build and Push Frontend Image (combined)
    - task: Docker@2
      displayName: 'Build and Push Frontend Image'
      inputs:
        command: buildAndPush
        containerRegistry: $(GCR_SERVICE_CONNECTION)
        dockerfile: './Dockerfile'
        buildContext: '.'
        tags: |
          $(REGISTRY)/$(GCP_PROJECT_ID)/$(FRONTEND_IMAGE):$(IMAGE_TAG)
          $(REGISTRY)/$(GCP_PROJECT_ID)/$(FRONTEND_IMAGE):latest
    
    # Publish image tag as artifact for deployment stage
    - publish: $(System.DefaultWorkingDirectory)
      artifact: k8s-manifests
      displayName: 'Publish Kubernetes manifests'

- stage: Deploy
  displayName: 'Deploy to GKE'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToGKE
    displayName: 'Deploy to Google Kubernetes Engine'
    environment: 'gke-production'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          # Download published artifacts
          - download: current
            artifact: k8s-manifests
          
          # Install kubectl (using built-in task)
          - task: KubectlInstaller@0
            displayName: 'Install kubectl'
            inputs:
              kubectlVersion: 'latest'
          
          # Install Google Cloud SDK (using script - no extension needed)
          - script: |
              # Install gcloud CLI
              echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
              curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
              sudo apt-get update
              sudo apt-get install -y google-cloud-sdk
              gcloud version
            displayName: 'Install Google Cloud SDK'
          
          # Authenticate to GKE using service account key
          - script: |
              echo $GCP_SERVICE_ACCOUNT_KEY > /tmp/gcp-key.json
              gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
              gcloud container clusters get-credentials $(GKE_CLUSTER) --zone $(GKE_ZONE) --project $(GCP_PROJECT_ID)
              rm /tmp/gcp-key.json
            displayName: 'Authenticate to GKE'
            env:
              GCP_SERVICE_ACCOUNT_KEY: $(GCP_SA_KEY)
          
          # Update backend deployment image
          - script: |
              kubectl set image deployment/trading-bot-backend \
                backend=$(REGISTRY)/$(GCP_PROJECT_ID)/$(BACKEND_IMAGE):$(IMAGE_TAG) \
                --namespace $(NAMESPACE) \
                --record
            displayName: 'Update Backend Deployment'
          
          # Update frontend deployment image
          - script: |
              kubectl set image deployment/trading-bot-frontend \
                frontend=$(REGISTRY)/$(GCP_PROJECT_ID)/$(FRONTEND_IMAGE):$(IMAGE_TAG) \
                --namespace $(NAMESPACE) \
                --record
            displayName: 'Update Frontend Deployment'
          
          # Wait for backend rollout
          - script: |
              kubectl rollout status deployment/trading-bot-backend \
                --namespace $(NAMESPACE) \
                --timeout=5m
            displayName: 'Wait for Backend Rollout'
          
          # Wait for frontend rollout
          - script: |
              kubectl rollout status deployment/trading-bot-frontend \
                --namespace $(NAMESPACE) \
                --timeout=5m
            displayName: 'Wait for Frontend Rollout'
          
          # Verify deployment
          - script: |
              kubectl get pods -n $(NAMESPACE)
              kubectl get services -n $(NAMESPACE)
              kubectl get ingress -n $(NAMESPACE)
            displayName: 'Verify Deployment Status'