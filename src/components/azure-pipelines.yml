# Single-stage Azure Pipeline for GKE deployment (GCR-Only)
trigger:
  branches:
    include:
    - dev
    - main

variables:
  GCP_PROJECT_ID: 'project-73bca58e-8d66-4aa9-be9'
  GKE_CLUSTER: 'trading-bot-dev-cluster'
  GKE_ZONE: 'us-central1-a'
  NAMESPACE: 'trading-bot'
  BACKEND_IMAGE: 'trading-bot-backend'
  FRONTEND_IMAGE: 'trading-bot-frontend'
  REGISTRY: 'gcr.io'
  IMAGE_TAG: $(Build.SourceVersion)

jobs:
- job: BuildAndDeploy
  displayName: 'Build, Push, and Deploy'
  pool:
    vmImage: 'ubuntu-latest'
  
  steps:
  - checkout: self
  
  # Setup Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
  
  - script: npm install && npm run lint || true
    displayName: 'Install dependencies'
  
  # Authenticate to GCP and GCR
  - script: |
      echo $(GCP_SA_KEY) | gcloud auth activate-service-account --key-file=-
      gcloud auth configure-docker gcr.io
    displayName: 'Authenticate to GCP'
    env:
      GCP_SA_KEY: $(GCP_SA_KEY_SECRET)
  
  # Build and push backend
  - task: Docker@2
    displayName: 'Build and Push Backend'
    inputs:
      command: buildAndPush
      containerRegistry: 'zero-day-brokers-dev'
      dockerfile: './mock-backend/Dockerfile'
      buildContext: './mock-backend'
      tags: |
        $(REGISTRY)/$(GCP_PROJECT_ID)/$(BACKEND_IMAGE):$(IMAGE_TAG)
  
  # Build and push frontend
  - task: Docker@2
    displayName: 'Build and Push Frontend'
    inputs:
      command: buildAndPush
      containerRegistry: 'zero-day-brokers-dev'
      dockerfile: './Dockerfile'
      buildContext: '.'
      tags: |
        $(REGISTRY)/$(GCP_PROJECT_ID)/$(FRONTEND_IMAGE):$(IMAGE_TAG)
  
  # Install kubectl and deploy
  - task: KubectlInstaller@0
    displayName: 'Install kubectl'
  
  - script: |
      gcloud container clusters get-credentials $(GKE_CLUSTER) --zone $(GKE_ZONE)
      kubectl create namespace $(NAMESPACE) --dry-run=client -o yaml | kubectl apply -f -
      kubectl set image deployment/trading-bot-backend backend=$(REGISTRY)/$(GCP_PROJECT_ID)/$(BACKEND_IMAGE):$(IMAGE_TAG) --namespace $(NAMESPACE)
      kubectl set image deployment/trading-bot-frontend frontend=$(REGISTRY)/$(GCP_PROJECT_ID)/$(FRONTEND_IMAGE):$(IMAGE_TAG) --namespace $(NAMESPACE)
      kubectl rollout status deployment/trading-bot-backend --namespace $(NAMESPACE)
      kubectl rollout status deployment/trading-bot-frontend --namespace $(NAMESPACE)
    displayName: 'Deploy to GKE'