name: Deploy to Dev (GKE)

on:
  push:
    branches: ['dev', 'main']

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: trading-bot-dev-cluster
  GKE_ZONE: us-central1-a
  BACKEND_IMAGE: trading-bot-backend
  FRONTEND_IMAGE: trading-bot-frontend

jobs:
  build-and-deploy:
    name: Build, Publish, and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Lint
        run: |-
          npm install
          npm run lint

      # Authenticate with Google Cloud
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Get GKE Credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Configure Docker for GCR
        run: |-
          gcloud auth configure-docker

      # Build and Push Backend
      - name: Build Backend Image
        run: |-
          docker build \
            --tag "gcr.io/$PROJECT_ID/$BACKEND_IMAGE:$GITHUB_SHA" \
            ./mock-backend

      - name: Publish Backend Image
        run: docker push "gcr.io/$PROJECT_ID/$BACKEND_IMAGE:$GITHUB_SHA"

      # Build and Push Frontend
      - name: Build Frontend Image
        run: |-
          docker build \
            --tag "gcr.io/$PROJECT_ID/$FRONTEND_IMAGE:$GITHUB_SHA" \
            .

      - name: Publish Frontend Image
        run: docker push "gcr.io/$PROJECT_ID/$FRONTEND_IMAGE:$GITHUB_SHA"

      # Deploy to GKE
      - name: Deploy to Kubernetes
        run: |-
        kubectl set image deployment/trading-bot-backend backend=gcr.io/$PROJECT_ID/$BACKEND_IMAGE:$GITHUB_SHA
        kubectl set image deployment/trading-bot-frontend frontend=gcr.io/$PROJECT_ID/$FRONTEND_IMAGE:$GITHUB_SHA
        kubectl rollout status deployment/trading-bot-backend
        kubectl rollout status deployment/trading-bot-frontend
