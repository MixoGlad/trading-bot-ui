<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .robot-eye { 
      transition: fill 0.3s ease; 
    }
    .pulsing { 
      animation: eye-pulse 2s infinite ease-in-out; 
    }
    @keyframes eye-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
  <!-- Robot Head -->
  <rect x="20" y="30" width="60" height="50" rx="10" fill="#4F46E5"/>
  <rect x="30" y="20" width="40" height="15" rx="5" fill="#4338CA"/>
  <!-- Eyes (Glowing) -->
  <circle class="robot-eye pulsing" cx="40" cy="50" r="6" fill="currentColor"/>
  <circle class="robot-eye pulsing" cx="60" cy="50" r="6" fill="currentColor"/>
  <!-- Crypto Symbol -->
  <text x="50" y="72" font-family="Arial" font-weight="bold" font-size="18" fill="#F59E0B" text-anchor="middle">₿</text>
  <path d="M50 20 V5 M45 5 H55" stroke="#4F46E5" stroke-width="4" stroke-linecap="round"/>
</svg>