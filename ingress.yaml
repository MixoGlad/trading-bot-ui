apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-bot-ingress
  annotations:
    # Switch to NGINX class
    kubernetes.io/ingress.class: "nginx"
    # Add this annotation to use cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Switch to production
    # Required for WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
  - hosts:
    - trading-bot.yourdomain.com # Ensure this domain has an A record pointing to your Static IP
    secretName: trading-bot-tls # cert-manager will create this secret for you
  rules:
  - host: trading-bot.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trading-bot-frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /stream
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80